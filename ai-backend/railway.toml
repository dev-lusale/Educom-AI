# ─────────────────────────────────────────────────────────────────
# Railway deployment config for Educom AI Backend (FastAPI)
# Docs: https://docs.railway.com/reference/config-as-code
# ─────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use sh -c so $PORT expands correctly (Railway injects PORT as an env var)
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 2 --log-level info'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Health check endpoint (FastAPI /health route)
healthcheckPath = "/health"
healthcheckTimeout = 30
