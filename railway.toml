# ─────────────────────────────────────────────────────────────────
# Railway config for the FRONTEND (Next.js) service
# This file is at the repo root so Railway's frontend service picks it up.
#
# The BACKEND (FastAPI) service must have Root Directory = "ai-backend"
# in the Railway dashboard. That service uses ai-backend/railway.toml.
# ─────────────────────────────────────────────────────────────────

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
