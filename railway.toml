# ─────────────────────────────────────────────────────────────────
# Railway deployment config — tells Railway the backend lives in
# the ai-backend/ subdirectory of this monorepo.
#
# In Railway dashboard, set Root Directory = ai-backend
# OR Railway reads this file from the repo root and respects [build].
# ─────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
# Path is relative to the root Railway sets for this service.
# When Root Directory is set to "ai-backend" in Railway dashboard,
# this path is just "Dockerfile".
dockerfilePath = "ai-backend/Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30
