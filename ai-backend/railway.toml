# ─────────────────────────────────────────────────────────────────
# Railway deployment config for Educom AI Backend (FastAPI)
# Docs: https://docs.railway.com/reference/config-as-code
# ─────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use sh -c so $PORT and $WORKERS expand correctly
# WORKERS defaults to 1 to stay within Railway hobby plan (512 MB RAM)
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers ${WORKERS:-1} --log-level info'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Health check endpoint (FastAPI /health route)
healthcheckPath = "/health"
healthcheckTimeout = 30
