# ─────────────────────────────────────────────────────────────────
# Railway deployment config for Educom AI Backend (FastAPI)
# Docs: https://docs.railway.com/reference/config-as-code
# ─────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT automatically — we read it in CMD
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Health check endpoint (FastAPI /health route)
healthcheckPath = "/health"
healthcheckTimeout = 30
